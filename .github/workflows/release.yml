name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from csproj
        id: version
        shell: pwsh
        run: |
          $xml = [xml](Get-Content "DisplaySwitcher/DisplaySwitcher.csproj")
          $version = $xml.Project.PropertyGroup.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Check if tag already exists
        id: tag_check
        shell: pwsh
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          git fetch --tags
          $exists = git tag --list $tag
          if ($exists) {
            echo "Tag $tag already exists, skipping release."
            echo "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET
        if: steps.tag_check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        if: steps.tag_check.outputs.skip == 'false'
        shell: pwsh
        run: |
          dotnet publish DisplaySwitcher/DisplaySwitcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o Build

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: DisplaySwitcher v${{ steps.version.outputs.version }}
          files: Build/DisplaySwitcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
